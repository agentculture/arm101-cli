# markdownlint-cli2 config for arm101-cli.
# markdownlint-cli2 stops walking at the git root, so a per-user global config
# in the home directory isn't picked up from inside the repo.
# Mirrors the guildmaster / steward / teken preset for workspace consistency.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader, and
  # devague-exported specs/plans carry long, machine-generated lines.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true
  # The next three accommodate devague-exported specs/plans under docs/, which
  # are machine-generated (not hand-authored prose) yet still linted:
  # MD026 — their title restates the announcement sentence and ends with '.'.
  MD026: false
  # MD033 — they carry literal <id>/<platform>/<motor> placeholders that the
  # linter reads as inline HTML tags.
  MD033: false
  # MD037 — export-style emphasis (e.g. ' _word_ ') trips the spaces-in-emphasis
  # check though it renders fine.
  MD037: false

ignores:
  - "node_modules/**"
  - ".local/**"
  - ".afi/**"
  - ".teken/**"
  # Vendored skills are cited verbatim from guildmaster — do not reformat them.
  - ".claude/skills/**"
